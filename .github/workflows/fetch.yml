name: Fetch Licitaciones (diario)

on:
  schedule:
    # Cada día a las 03:00 UTC (05:00 hora España peninsular)
    - cron: "0 3 * * *"
  workflow_dispatch:          # permite lanzarlo a mano desde GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # necesario para push del data.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ejecutar fetcher (ATOM live)
        run: |
          mkdir -p data
          cp data/licitaciones.json data.json 2>/dev/null || true
          python fetch_licitaciones.py --min-score 20
          mv data.json data/licitaciones.json

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/licitaciones.json
          git diff --cached --quiet || git commit -m "data.json actualizado $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
