name: Fetch Licitaciones (Scheduled Safe Merge)

# BRANCH NOTE
# Production data now lives on main after v0.5.0b promotion.
# experimental/wip remains the integration/canon development lane.
# extensions remains a separate branch/worktree for non-licitaciones surfaces.

# ============================================================
# BRANCH NOTE
# This workflow checks out branch 'main'.
# Production data lives on main after v0.5.0b promotion.
# experimental/wip remains the integration/canon development lane.
# extensions remains a separate branch/worktree for non-licitaciones surfaces.
# ============================================================
#
# Schedule strategy: DST-safe option B
#   cron fires at 06:00, 07:00, 15:00, 16:00 UTC every day.
#   A Python guard (step: local-time-guard) computes Europe/Madrid
#   local time via zoneinfo and only sets RUN_FETCH=true when
#   local hour is 08 or 17. Other cron fires exit cleanly.
#
# workflow_dispatch inputs:
#   dry_run  — if "true", skip live fetch (diagnostic only)
#   force_run — if "true", bypass local-hour guard (run regardless of Madrid time)

on:
  schedule:
    - cron: "0 6 * * *"   # CEST morning  -> 08:00 Madrid (summer, UTC+2)
    - cron: "0 7 * * *"   # CET  morning  -> 08:00 Madrid (winter, UTC+1)
    - cron: "0 15 * * *"  # CEST evening  -> 17:00 Madrid (summer, UTC+2)
    - cron: "0 16 * * *"  # CET  evening  -> 17:00 Madrid (winter, UTC+1)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = skip live fetch, run diagnostic only"
        required: false
        default: "false"
      force_run:
        description: "true = bypass local-hour guard (run regardless of Madrid time)"
        required: false
        default: "false"

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      AUTOMATION_ID: ADGOPS_AUTO_FETCHER1_SCHEDULED
      AUTOMATION_KIND: fetcher1-scheduled
      AUTOMATION_DATA_FILE: data/licitaciones.json
      AUTOMATION_SOURCES: "PLACSP-643, PLACSP-1044"

    steps:
      - name: Checkout repo (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tzdata

      - name: Nominal-schedule guard (Europe/Madrid)
        id: time_guard
        run: |
          python - <<'PYEOF'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          force          = os.environ.get("INPUT_FORCE_RUN", "false").lower() == "true"
          is_manual      = os.environ.get("GITHUB_EVENT_NAME", "") == "workflow_dispatch"
          dry_run        = os.environ.get("INPUT_DRY_RUN", "false").lower() == "true"
          event_name     = os.environ.get("GITHUB_EVENT_NAME", "unknown")
          event_schedule = os.environ.get("EVENT_SCHEDULE", "").strip()

          now          = datetime.now(ZoneInfo("Europe/Madrid"))
          offset_hours = int(now.utcoffset().total_seconds() // 3600)

          # Each nominal slot is valid only when Madrid is at the matching UTC offset.
          # This makes the guard robust to delayed cron start times.
          SLOT_OFFSET = {
              "0 6 * * *":  2,   # CEST morning  -> 08:00 Madrid
              "0 15 * * *": 2,   # CEST evening  -> 17:00 Madrid
              "0 7 * * *":  1,   # CET  morning  -> 08:00 Madrid
              "0 16 * * *": 1,   # CET  evening  -> 17:00 Madrid
          }

          if force or is_manual:
              run_fetch = "true"
              reason    = "manual/forced dispatch"
          elif event_schedule in SLOT_OFFSET:
              expected = SLOT_OFFSET[event_schedule]
              if offset_hours == expected:
                  run_fetch = "true"
                  reason    = f"nominal slot '{event_schedule}' matches Madrid UTC+{offset_hours}h"
              else:
                  run_fetch = "skip"
                  reason    = f"nominal slot '{event_schedule}' expects UTC+{expected}h but Madrid is UTC+{offset_hours}h — DST mismatch, skipping"
          else:
              run_fetch = "skip"
              reason    = f"unrecognised schedule '{event_schedule}' — skipping"

          print(
              f"[guard] event={event_name}"
              f" schedule='{event_schedule}'"
              f" Madrid={now.strftime('%Y-%m-%d %H:%M %Z')}"
              f" UTC_offset=+{offset_hours}h"
              f" reason={reason}"
              f" RUN_FETCH={run_fetch}"
          )

          with open(os.environ["GITHUB_ENV"], "a") as fh:
              fh.write(f"RUN_FETCH={run_fetch}\n")
              fh.write(f"DRY_RUN_MODE={'true' if dry_run else 'false'}\n")
              # Context for the operational summary step (single-line values).
              fh.write(f"GUARD_EVENT={event_name}\n")
              fh.write(f"GUARD_SCHEDULE={event_schedule}\n")
              fh.write(f"GUARD_MADRID={now.strftime('%Y-%m-%d %H:%M %Z')}\n")
              fh.write(f"GUARD_OFFSET=+{offset_hours}h\n")
              fh.write(f"GUARD_REASON={reason}\n")
              fh.write(f"GUARD_FORCE={'true' if force else 'false'}\n")
              fh.write(f"GUARD_DRY_RUN_INPUT={'true' if dry_run else 'false'}\n")
          PYEOF
        env:
          INPUT_FORCE_RUN: ${{ inputs.force_run || 'false' }}
          INPUT_DRY_RUN:   ${{ inputs.dry_run   || 'false' }}
          EVENT_SCHEDULE:  ${{ github.event.schedule || '' }}

      - name: Run scheduled helper (live fetch + lifecycle-safe merge)
        id: helper
        if: env.RUN_FETCH == 'true' && env.DRY_RUN_MODE == 'false'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _tmp
          # set -o pipefail: the helper's exit code propagates through tee, so a
          # fail-closed refusal (EMPTY_FAILURE / partial candidate) fails the step
          # instead of being masked by tee's own exit 0.
          python tools/scheduled_fetch_merge.py --run-live --allow-production-write 2>&1 | tee _tmp/run_helper.log

      - name: Diagnostic only (dry_run=true)
        id: dryrun
        if: env.RUN_FETCH == 'true' && env.DRY_RUN_MODE == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _tmp
          # set -o pipefail: a non-zero --check / --validate-production must fail the
          # step even though it is piped through tee.
          echo "[workflow] dry_run=true — running --check only, no production write" | tee _tmp/run_helper.log
          python tools/scheduled_fetch_merge.py --check | tee -a _tmp/run_helper.log
          python tools/scheduled_fetch_merge.py --validate-production | tee -a _tmp/run_helper.log

      - name: Validate production JSON
        id: validate
        if: env.RUN_FETCH == 'true' && env.DRY_RUN_MODE == 'false'
        run: |
          python -m json.tool data/licitaciones.json > /dev/null
          echo "data/licitaciones.json: valid JSON"

      - name: Diff summary
        id: diffsummary
        if: env.RUN_FETCH == 'true' && env.DRY_RUN_MODE == 'false'
        run: |
          git diff --stat
          if git diff --quiet -- data/licitaciones.json; then
            echo "MONOLITH_CHANGED=false" >> "$GITHUB_ENV"
          else
            echo "MONOLITH_CHANGED=true" >> "$GITHUB_ENV"
          fi

      - name: Build data shards (freshness sync)
        id: shards
        if: env.RUN_FETCH == 'true' && env.DRY_RUN_MODE == 'false' && env.MONOLITH_CHANGED == 'true'
        run: |
          python tools/build_data_shards.py \
            --input data/licitaciones.json \
            --out-dir data \
            --years 2026,2025,2024 \
            --archive-name archive \
            --manifest data/licitaciones_manifest.json

      - name: Validate shard freshness
        id: shardvalidate
        if: env.RUN_FETCH == 'true' && env.DRY_RUN_MODE == 'false' && env.MONOLITH_CHANGED == 'true'
        run: |
          python - <<'PYEOF'
          import json, sys

          with open("data/licitaciones.json", encoding="utf-8") as f:
              monolith = json.load(f)
          monolith_records = monolith.get("data") or []
          monolith_count = len(monolith_records)
          monolith_ts = (monolith.get("meta") or {}).get("scheduled_merge_applied_at")

          with open("data/licitaciones_manifest.json", encoding="utf-8") as f:
              manifest = json.load(f)

          errors = []
          counts = manifest.get("counts", {})
          if counts.get("source_records") != monolith_count:
              errors.append(f"manifest.counts.source_records {counts.get('source_records')} != monolith count {monolith_count}")
          if counts.get("sharded_records") != monolith_count:
              errors.append(f"manifest.counts.sharded_records {counts.get('sharded_records')} != monolith count {monolith_count}")

          shard_total = 0
          for shard in manifest.get("shards", []):
              with open(shard["path"], encoding="utf-8") as sf:
                  shard_total += len((json.load(sf) or {}).get("data") or [])
          if shard_total != monolith_count:
              errors.append(f"sum of shard record counts {shard_total} != monolith count {monolith_count}")

          source_meta = manifest.get("source_meta", {})
          manifest_ts = source_meta.get("scheduled_merge_applied_at")
          if monolith_ts and manifest_ts != monolith_ts:
              errors.append(f"manifest source_meta.scheduled_merge_applied_at {manifest_ts!r} != monolith meta.scheduled_merge_applied_at {monolith_ts!r}")

          if source_meta.get("production_write_performed") is not True:
              errors.append("manifest source_meta.production_write_performed is not true — source_meta reflects an unpromoted dry-run candidate, not live production data")

          if errors:
              print("SHARD VALIDATION FAILED:")
              for e in errors:
                  print(" -", e)
              sys.exit(1)

          print(f"Shard validation OK: monolith={monolith_count} shard_total={shard_total} ts={manifest_ts}")
          PYEOF

      - name: Commit data if changed
        id: commit
        if: env.RUN_FETCH == 'true' && env.DRY_RUN_MODE == 'false'
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/licitaciones.json data/licitaciones_manifest.json data/licitaciones_2026.json data/licitaciones_2025.json data/licitaciones_2024.json data/licitaciones_archive.json
          if git diff --cached --quiet; then
            echo "no data changes to commit"
            echo "DATA_CHANGED=false" >> "$GITHUB_ENV"
          else
            # A commit is created only when the helper succeeded, validation passed and
            # data changed — so the commit-time operational status is, by construction,
            # SUCCESS_REAL_FETCH_WRITE. A later push failure cannot be known here; the
            # operational summary (not the commit body) reports FAIL_CLOSED_GIT_PUSH.
            COMMIT_SUBJECT="data(auto/fetcher1-scheduled): update licitaciones [run #${{ github.run_number }} | SUCCESS_REAL_FETCH_WRITE]"
            COMMIT_TRAILERS="Automation-ID: ${AUTOMATION_ID}
          Workflow: Fetch Licitaciones Scheduled Safe Merge
          GitHub-Run: ${{ github.run_number }}
          Operational-Status: SUCCESS_REAL_FETCH_WRITE
          Data-File: ${AUTOMATION_DATA_FILE}
          Sources: ${AUTOMATION_SOURCES}
          Trigger: ${GUARD_EVENT:-unknown} ${GUARD_SCHEDULE:-}
          Madrid-Time: ${GUARD_MADRID:-unknown} (${GUARD_OFFSET:-?})
          Guard-Reason: ${GUARD_REASON:-unknown}"
            git commit -m "$COMMIT_SUBJECT" -m "$COMMIT_TRAILERS"
            echo "DATA_CHANGED=true" >> "$GITHUB_ENV"
          fi

      - name: Push
        id: push
        if: env.RUN_FETCH == 'true' && env.DRY_RUN_MODE == 'false' && env.DATA_CHANGED == 'true'
        run: |
          git push

      - name: Operational summary
        if: always()
        env:
          HELPER_OUTCOME:      ${{ steps.helper.outcome }}
          DRYRUN_OUTCOME:      ${{ steps.dryrun.outcome }}
          VALIDATE_OUTCOME:    ${{ steps.validate.outcome }}
          DIFFSUMMARY_OUTCOME: ${{ steps.diffsummary.outcome }}
          COMMIT_OUTCOME:      ${{ steps.commit.outcome }}
          PUSH_OUTCOME:        ${{ steps.push.outcome }}
          GH_EVENT_NAME:       ${{ github.event_name }}
          GH_RUN_NUMBER:       ${{ github.run_number }}
        run: |
          mkdir -p _tmp
          # Operational-status classification, Step Summary, OPERATIONAL_STATUS env,
          # and the p188 machine-readable run report are produced by the single
          # source of truth in tools/scheduled_run_classify.py (extracted from the
          # former inline heredoc in p190; behaviour-preserving). The same module is
          # imported by the offline regression harness so workflow and tests agree.
          python tools/scheduled_run_classify.py

      - name: Upload fail-closed diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adgops-auto-fetcher1-scheduled-diagnostics-${{ github.run_number }}
          path: |
            _tmp/scheduled_live_candidate_*.json
            _tmp/scheduled_merge_conflicts_live_*.json
            _tmp/scheduled_run_report_*.json
            _tmp/run_helper.log
          retention-days: 7
          if-no-files-found: ignore
