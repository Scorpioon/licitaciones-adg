name: Actualizar licitaciones

on:
  schedule:
    - cron: '0 7 * * 1-5'   # Lunes-viernes 9:00h Madrid
  workflow_dispatch:          

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar fetcher
        run: python fetch_licitaciones.py

      - name: Publicar data.json
        run: |
          git config user.name "ADG Bot"
          git config user.email "bot@adg-fad.org"
          git add data.json
          git diff --staged --quiet || git commit -m "datos: $(date +%Y-%m-%d)"
          git push
